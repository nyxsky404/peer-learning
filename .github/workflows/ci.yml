name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: package-lock.json  

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Backend Dependencies
        run: cd backend && npm ci

      - name: Run Linter
        run: npm run lint

      # - name: Verify Supabase Types
      #   run: |
      #     npx supabase start
      #     npm run generate-types
      #     git diff --exit-code src/integrations/supabase/types.ts || (echo "Supabase types are outdated. Please run 'npm run generate-types' locally and commit." && exit 1)

      - name: Run Tests with Coverage
        run: npx vitest run --coverage
        env:
          NODE_ENV: test
          SUPABASE_JWT_SECRET: dummy-secret-for-ci
          FRONTEND_URL: http://localhost:5173

      - name: Run Backend Tests
        run: cd backend && npm test
        env:
          NODE_ENV: test
          SUPABASE_JWT_SECRET: dummy-secret-for-ci
          FRONTEND_URL: http://localhost:5173
